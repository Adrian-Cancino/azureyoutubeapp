<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicacion Azure</title>
    <script>
        var callAPI = (nombre, apellido) =>{
            var myHeaders = new Headers();
            myHeaders.append("Content-Type", "application/json");
            var raw = JSON.stringify({"nombre":nombre, "apellido":apellido});
            var requestOptions={
                method:'POST',
                hedaers:myHeaders,
                body:raw
            };

            fetch("https://funcion-youtube-abgvcdhcatfpdaeu.mexicocentral-01.azurewebsites.net/api/funcion_nombre", requestOptions)
            .then(response => response.json())
            .then(result => alert(result.mensaje))
            .catch(error => console.log("error:", error))
        }
    </script>
</head>
<body>
    <form action="" method="post">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre">
        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido">
        <button
        type="button"
        onclick="callAPI(document.getElementById('nombre').value, document.getElementById('apellido').value)"
        >Enviar</button>
    </form>
</body>
</html>
